<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <th:block th:fragment="bootstrapCss()">
        <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" />
    </th:block>
    <title>Fragments</title>
</head>

<body>
    <th:block th:fragment="navbar">
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="/">
                    <img th:src="@{/logo.png}" alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a th:class="|nav-link |" href="#">Pizzas</a>
                        </li>
                        <li class="nav-item">
                            <a th:class="|nav-link disabled|" href="#">to set</a>
                        </li>
                    </ul>

                </div>
            </div>
        </nav>
    </th:block>


    <th:block th:fragment="bootstrapJs()">
        <script th:src="@{/webjars/bootstrap/5.3.8/bootstrap.bundle.min.js}"></script>
    </th:block>
</body>

</html>
